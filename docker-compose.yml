version: '3.8'

services:
  pyachok-postgres:
    image: postgis/postgis:16-3.4
    ports:
      - '55432:5432'
    environment:
      POSTGRES_USER: '${POSTGRES_USER:-postgres}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-qweqwe}'
      POSTGRES_DB: '${POSTGRES_DB:-pyachok}'
    volumes:
      - pyachok-api-db:/var/lib/postgresql/data

  pyachok-redis:
    image: redis:7.2.3
    ports:
      - '${REDIS_PORT:-6379}:6379'
    command: >
      --requirepass '${REDIS_PASSWORD:-redispass}'
    restart: unless-stopped

  pyachok-s3:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    ports:
      - "8000:9000"
      - "8001:9001"
    volumes:
      - pyachok-api-s3-data:/data
    environment:
      MINIO_ROOT_USER: user
      MINIO_ROOT_PASSWORD: password

volumes:
  pyachok-api-db:
  pyachok-api-s3-data:

